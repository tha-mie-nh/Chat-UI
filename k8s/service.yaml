apiVersion: v1
kind: Service
metadata:
  name: chatbot-ui
  labels:
    app: chatbot-ui
spec:
  # Use LoadBalancer for cloud (GKE, EKS, AKS) — gets a public IP automatically.
  # Use NodePort for local/bare-metal clusters.
  type: LoadBalancer
  selector:
    app: chatbot-ui
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

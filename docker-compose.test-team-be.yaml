# Test compose: giả lập team BE deploy FE trỏ đến BE của họ
# Usage: docker-compose -f docker-compose.test-team-be.yaml up -d

services:
  frontend:
    image: gthanh/chatbot-frontend:latest
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://localhost:4001
    restart: unless-stopped

  mock-team-be:
    build:
      context: ./backend
      dockerfile: src/mock/Dockerfile.mock-team-be
    ports:
      - "4001:4001"
    restart: unless-stopped
